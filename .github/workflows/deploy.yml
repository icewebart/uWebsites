name: Deploy

# Runner checks out the code, rsyncs the source to the VPS (75.119.159.89),
# then installs + builds + reloads the API under PM2. The server needs no
# GitHub access — only the VPS SSH key (secret). apps/api/.env on the server is
# preserved (excluded from the sync). Schema changes are applied manually with
# `pnpm --filter @uwebsites/db db:push` (not auto-run here, to avoid surprises).

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'ecosystem.config.cjs'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust the VPS host key
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude .next --exclude dist \
            --exclude .git --exclude drizzle --exclude 'apps/api/.env' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/www/wwwroot/uwebsites/"

      - name: Install, build, reload (API + Web)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' <<'REMOTE'
            set -e
            export PATH="/usr/bin:/usr/local/bin:$PATH"
            cd /www/wwwroot/uwebsites
            FLAG="--config.verify-deps-before-run=false"
            pnpm install $FLAG || true
            pnpm $FLAG --filter @uwebsites/shared build
            pnpm $FLAG --filter @uwebsites/db build
            pnpm $FLAG --filter @uwebsites/api build
            # Web (Next standalone): build, then copy static/public into the standalone tree
            pnpm $FLAG --filter @uwebsites/web build
            rm -rf apps/web/.next/standalone/apps/web/.next/static
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
            [ -d apps/web/public ] && cp -r apps/web/public apps/web/.next/standalone/apps/web/public || true
            # restart (not reload) so the Next standalone build is always swapped cleanly
            pm2 restart uwebsites-api --update-env || pm2 start ecosystem.config.cjs --only uwebsites-api
            pm2 restart uwebsites-web --update-env || pm2 start ecosystem.config.cjs --only uwebsites-web
            pm2 save
          REMOTE
